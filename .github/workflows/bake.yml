name: Build and Release HwGDBot

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v2.0.0)'
        required: true
      release-title:
        description: 'Release title'
        required: true
      description:
        description: 'Release description'
        required: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Create icons directory and placeholder icon
        run: |
          New-Item -ItemType Directory -Force -Path "src-tauri/icons"
          $iconPath = "src-tauri/icons/icon.ico"
          
          # Create a simple 1x1 pixel ICO file (smallest valid ICO)
          $iconBytes = [byte[]](0x00, 0x00, 0x01, 0x00, 0x01, 0x00, 0x01, 0x01, 0x00, 0x00, 0x01, 0x00, 0x18, 0x00, 0x30, 0x00, 0x00, 0x00, 0x16, 0x00, 0x00, 0x00, 0x28, 0x00, 0x00, 0x00, 0x01, 0x00, 0x00, 0x00, 0x02, 0x00, 0x00, 0x00, 0x01, 0x00, 0x18, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0xFF, 0xFF, 0xFF, 0x00, 0x00, 0x00, 0x00)
          [System.IO.File]::WriteAllBytes($iconPath, $iconBytes)
        shell: pwsh
      
      - name: Install dependencies
        run: |
          cd src-tauri
          cargo fetch
      
      - name: Build Tauri app
        run: |
          cd src-tauri
          cargo build --release
      
      - name: Package Windows
        run: |
          mkdir HwGDBot-Windows
          Copy-Item -Path "src-tauri/target/release/hwgdbot.exe" -Destination "HwGDBot-Windows/"
          Copy-Item -Path "src" -Destination "HwGDBot-Windows/src" -Recurse
          New-Item -ItemType Directory -Force -Path "HwGDBot-Windows/icons"
          Copy-Item -Path "python" -Destination "HwGDBot-Windows/python" -Recurse
          Copy-Item -Path "README.md" -Destination "HwGDBot-Windows/"
          Compress-Archive -Path "HwGDBot-Windows/*" -DestinationPath "HwGDBot-Windows.zip"
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: HwGDBot-Windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev
      
      - name: Create icons directory
        run: |
          mkdir -p src-tauri/icons
          mkdir -p icons
      
      - name: Build Tauri app
        run: |
          cd src-tauri
          cargo build --release
      
      - name: Package Linux
        run: |
          mkdir -p HwGDBot-Linux
          cp src-tauri/target/release/hwgdbot HwGDBot-Linux/
          cp -r src HwGDBot-Linux/
          mkdir -p HwGDBot-Linux/icons
          cp -r python HwGDBot-Linux/
          cp README.md HwGDBot-Linux/
          tar -czf HwGDBot-Linux.tar.gz HwGDBot-Linux
      
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: HwGDBot-Linux.tar.gz

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Download Windows artifact
        uses: actions/download-artifact@v3
        with:
          name: windows-build
      
      - name: Download Linux artifact
        uses: actions/download-artifact@v3
        with:
          name: linux-build
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.release-title }}
          body: ${{ github.event.inputs.description }}
          files: |
            HwGDBot-Windows.zip
            HwGDBot-Linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
